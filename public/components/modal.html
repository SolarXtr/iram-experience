<!-- RMIS Modal Component -->
<div class="modal-overlay" id="exampleModal" aria-hidden="true" role="dialog" aria-labelledby="modalTitle">
    <div class="modal-dialog">
        <div class="modal-header">
            <h3 id="modalTitle">Confirm Action</h3>
            <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close">✕</button>
        </div>
        <div class="modal-body">
            <p>Are you sure you want to approve this research proposal? This action cannot be undone.</p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary">Approve</button>
        </div>
    </div>
</div>
