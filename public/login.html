<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | iRAM RMIS</title>
    
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f6f8;
            margin: 0;
            font-family: var(--font-family, sans-serif);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .login-logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .login-subtitle {
            color: var(--text-color);
            opacity: 0.7;
            margin-bottom: 32px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn-google {
            width: 100%;
            background-color: white;
            color: #333;
            border: 1px solid #ccc;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-google:hover {
            background-color: #f1f3f5;
        }
    </style>
</head>
<body>

    <div class="card login-card">
        <div class="login-logo">iRAM</div>
        <div class="login-subtitle">Research Management Information System</div>

        <!-- MOCK LOGIN FORM -->
        <div class="form-group">
            <label for="mockRole">Simulation Mode: Select Role</label>
            <select id="mockRole" class="form-control">
                <option value="Researcher">Researcher</option>
                <option value="Reviewer">Reviewer</option>
                <option value="Administrator">Administrator</option>
            </select>
        </div>

        <button id="loginBtn" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="20">
            Sign in with Google Workspace
        </button>

        <p style="margin-top:24px; font-size:0.85rem; color:#888;">
            * This is a local simulation. Real Google Workspace authentication will be integrated in Phase 4.
        </p>
    </div>

    <!-- JS Dependencies -->
    <script src="assets/js/auth.js"></script>
    <script>
        document.getElementById('loginBtn').addEventListener('click', () => {
            const roleSelect = document.getElementById('mockRole');
            const role = roleSelect.value;
            const username = `Mock ${role}`; // e.g. Mock Administrator
            
            // Trigger auth manager login
            if(window.iRAMAuth) {
                window.iRAMAuth.login(role, username);
            }
        });
    </script>
</body>
</html>
