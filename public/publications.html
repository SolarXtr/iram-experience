<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | RAM-U</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <div id="app">
        <div id="sidebar-placeholder"></div>
        <div id="navbar-placeholder"></div>

        <main class="main-content">
            <header style="margin-bottom: 24px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h1>Publications & Outputs</h1>
                    <p class="text-muted">Repository of academic articles and research outputs.</p>
                </div>
                <button class="btn btn-primary">+ Add Publication</button>
            </header>

            <div class="card" style="margin-bottom: 24px; padding: 16px;">
                <div style="display:flex; gap:16px; align-items:center;">
                    <input type="text" class="form-control" placeholder="Search by title, author, or DOI..." style="flex:1;">
                    <select class="form-control" style="width:200px;">
                        <option value="">All Years</option>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                    </select>
                    <button class="btn btn-outline">Filter</button>
                </div>
            </div>

            <div class="card" id="publications-table-container">
                <!-- Datatable will be rendered here -->
                <div style="text-align:center; padding:20px;">Loading publications...</div>
            </div>
        </main>
    </div>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/datatable.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('publications-table-container');
            const yearFilter = document.querySelector('select.form-control');
            const searchInput = document.querySelector('input[type="text"].form-control');
            
            try {
                const rawPublications = await window.api.publications.getAll();
                if (rawPublications.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:20px;">No publications found</div>';
                    return;
                }

                // Process data
                const processedData = rawPublications.map(pub => {
                    let authorsStr = 'Unknown';
                    try {
                        const authorsArr = JSON.parse(pub.authors);
                        authorsStr = authorsArr.map(a => a.name).join(', ');
                    } catch(e) {}

                    let displayDate = pub.year || (pub.coverDate ? pub.coverDate.substring(0,4) : null) || (pub.createdAt ? new Date(pub.createdAt).getFullYear().toString() : 'N/A');
                    
                    let badgeColor = '#17a2b8';
                    let displayStatus = pub.status || 'Published';
                    if (pub.status === 'ARTICLE_IN_PRESS') {
                        badgeColor = '#f39c12';
                        displayStatus = 'Ahead of print';
                    }

                    return {
                        ...pub,
                        displayDate,
                        authorsStr,
                        displayStatus,
                        badgeColor
                    };
                });

                // Extract unique years
                const uniqueYears = [...new Set(processedData.map(p => p.displayDate).filter(y => y !== 'N/A'))].sort().reverse();
                
                // Populate Year filter
                yearFilter.innerHTML = `
                    <option value="LAST_5">Last 5 Years</option>
                    <option value="LAST_3">Last 3 Years</option>
                    <option value="LAST_10">Last 10 Years</option>
                    <option value="ALL">All Years</option>
                    <option disabled>──────────</option>
                `;
                uniqueYears.forEach(y => {
                    const opt = document.createElement('option');
                    opt.value = y;
                    opt.textContent = y;
                    yearFilter.appendChild(opt);
                });

                // Setup Table
                const columns = [
                    { key: 'displayDate', label: 'Year' },
                    { key: 'title', label: 'Title', render: (val) => val || 'Untitled' },
                    { key: 'authorsStr', label: 'Authors' },
                    { key: 'journal', label: 'Journal', render: (val) => val || 'Unknown Journal' },
                    { 
                        key: 'displayStatus', 
                        label: 'Status',
                        render: (val, row) => `<span class="badge" style="background:${row.badgeColor}; color:white; padding:4px 8px; border-radius:4px; font-size:0.85em; white-space:nowrap;">${val}</span>`
                    }
                ];

                const currentYear = new Date().getFullYear();
                
                const filterData = () => {
                    const searchVal = searchInput.value.toLowerCase();
                    const yearVal = yearFilter.value;
                    
                    return processedData.filter(pub => {
                        // Search Match
                        const matchesSearch = !searchVal || 
                            (pub.title || '').toLowerCase().includes(searchVal) ||
                            (pub.authorsStr || '').toLowerCase().includes(searchVal) ||
                            (pub.journal || '').toLowerCase().includes(searchVal);
                            
                        if (!matchesSearch) return false;
                        
                        // Year Match
                        if (yearVal === 'ALL') return true;
                        
                        const pubYear = parseInt(pub.displayDate);
                        if (isNaN(pubYear)) return false; // Hide N/A if year filter active
                        
                        if (yearVal === 'LAST_5') return pubYear >= currentYear - 4; // e.g. 2026 -> 2022-2026
                        if (yearVal === 'LAST_3') return pubYear >= currentYear - 2;
                        if (yearVal === 'LAST_10') return pubYear >= currentYear - 9;
                        
                        return pub.displayDate === yearVal;
                    });
                };

                const dataTable = new InteractiveTable('publications-table-container', {
                    columns,
                    data: filterData(),
                    pageSize: 25,
                    defaultSort: 'displayDate',
                    defaultSortAsc: false
                });
                
                // Bind events
                yearFilter.addEventListener('change', () => {
                    dataTable.setData(filterData());
                });
                
                searchInput.addEventListener('input', () => {
                    dataTable.setData(filterData());
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="text-align:center; padding:20px; color:red;">Failed to load data. Ensure backend is running.</div>';
            }
        });
    </script>
</body>
</html>
