<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Researchers Directory | RAM-U</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <div id="app">
        <div id="sidebar-placeholder"></div>
        <div id="navbar-placeholder"></div>

        <main class="main-content">
            <header style="margin-bottom: 24px;">
                <h1>Researchers Directory</h1>
                <p class="text-muted">Database of academic and clinical researchers.</p>
            </header>

            <!-- Search & Filter Bar -->
            <div class="card" style="margin-bottom: 24px; padding: 16px;">
                <div style="display:flex; gap:16px; align-items:center;">
                    <input type="text" class="form-control" placeholder="Search by name, expertise, or Scopus ID..." style="flex:1;">
                    <select class="form-control" style="width:200px;">
                        <option value="">All Departments</option>
                        <option value="medicine">Medicine</option>
                        <option value="surgery">Surgery</option>
                        <option value="pediatrics">Pediatrics</option>
                    </select>
                    <button class="btn btn-outline">Filter</button>
                </div>
            </div>

            <div class="card" id="researchers-table-container">
                <div style="text-align:center; padding:40px;">Loading researchers...</div>
            </div>
        </main>
    </div>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/datatable.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('researchers-table-container');
            const searchInput = document.querySelector('input[type="text"].form-control');
            const deptFilter = document.querySelector('select.form-control');
            
            try {
                const researchers = await window.api.researchers.getAll();
                
                if (researchers.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:40px;">No researchers found</div>';
                    return;
                }
                
                // Add default status and format numbers
                const processed = researchers.map(res => ({
                    ...res,
                    displayStatus: res.status || 'Active',
                    projectsCount: res.projects_count || 0,
                    publicationsCount: res.publications_count || 0,
                    department: res.department || 'Researcher'
                }));

                // Populate Department Filter dynamically
                const depts = [...new Set(processed.map(r => r.department))].sort();
                deptFilter.innerHTML = '<option value="ALL">All Departments</option>';
                depts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d;
                    opt.textContent = d;
                    deptFilter.appendChild(opt);
                });

                const columns = [
                    { key: 'name', label: 'Name' },
                    { key: 'department', label: 'Department' },
                    { key: 'projectsCount', label: 'Projects' },
                    { key: 'publicationsCount', label: 'Publications' },
                    { 
                        key: 'displayStatus', 
                        label: 'Status',
                        render: (val) => {
                            let color = val === 'Active' ? 'green' : (val === 'Resigned' ? 'orange' : 'gray');
                            return `<span style="color:${color}; font-weight:bold;">${val}</span>`;
                        }
                    }
                ];

                const filterData = () => {
                    const searchVal = searchInput.value.toLowerCase();
                    const deptVal = deptFilter.value;
                    
                    return processed.filter(res => {
                        const matchesSearch = !searchVal || 
                            (res.name || '').toLowerCase().includes(searchVal) ||
                            (res.scopusId || '').toLowerCase().includes(searchVal);
                            
                        const matchesDept = deptVal === 'ALL' || res.department === deptVal;
                        
                        return matchesSearch && matchesDept;
                    });
                };

                const dataTable = new InteractiveTable('researchers-table-container', {
                    columns,
                    data: filterData(),
                    pageSize: 25,
                    defaultSort: 'name',
                    defaultSortAsc: true
                });
                
                searchInput.addEventListener('input', () => dataTable.setData(filterData()));
                deptFilter.addEventListener('change', () => dataTable.setData(filterData()));

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="text-align:center; padding:40px; color:red;">Failed to load data. Ensure backend is running.</div>';
            }
        });
    </script>
</body>
</html>
