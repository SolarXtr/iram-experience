<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Projects | RAM-U</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <div id="app">
        <!-- Layout Placeholders -->
        <div id="sidebar-placeholder"></div>
        <div id="navbar-placeholder"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 24px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h1>Research Projects</h1>
                    <p class="text-muted">Manage ongoing and completed research initiatives.</p>
                </div>
                <button class="btn btn-primary">+ New Project</button>
            </header>

            <!-- Search & Filter Bar -->
            <div class="card" style="margin-bottom: 24px; padding: 16px;">
                <div style="display:flex; gap:16px; align-items:center;">
                    <input type="text" class="form-control" placeholder="Search projects by title or PI..." style="flex:1;">
                    <select class="form-control" style="width:200px;">
                        <option value="">All Statuses</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="pending">Pending</option>
                    </select>
                    <button class="btn btn-outline">Filter</button>
                </div>
            </div>

            <!-- Data Table -->
            <div class="card">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Project ID</th>
                                <th>Title</th>
                                <th>Principal Investigator</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>PRJ-2026-101</td>
                                <td>Advanced Nanomaterials for Drug Delivery</td>
                                <td>Dr. Naresuan</td>
                                <td><span style="color:green; font-weight:bold;">Active</span></td>
                                <td><button class="btn btn-sm">Manage</button></td>
                            </tr>
                            <tr>
                                <td>PRJ-2026-099</td>
                                <td>AI Diagnostics in Radiology</td>
                                <td>Dr. Medical</td>
                                <td><span style="color:blue; font-weight:bold;">Completed</span></td>
                                <td><button class="btn btn-sm">View</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/components.js"></script>
</body>
</html>
