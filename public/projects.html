<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Projects | RAM-U</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <div id="app">
        <!-- Layout Placeholders -->
        <div id="sidebar-placeholder"></div>
        <div id="navbar-placeholder"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 24px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h1>Research Projects</h1>
                    <p class="text-muted">Manage ongoing and completed research initiatives.</p>
                </div>
                <button class="btn btn-primary">+ New Project</button>
            </header>

            <!-- Search & Filter Bar -->
            <div class="card" style="margin-bottom: 24px; padding: 16px;">
                <div style="display:flex; gap:16px; align-items:center;">
                    <input type="text" class="form-control" placeholder="Search projects by title or PI..." style="flex:1;">
                    <select class="form-control" style="width:200px;">
                        <option value="">All Statuses</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="pending">Pending</option>
                    </select>
                    <button class="btn btn-outline">Filter</button>
                </div>
            </div>

            <!-- Data Table -->
            <div class="card" id="projects-table-container">
                <div style="text-align:center; padding:20px;">Loading projects...</div>
            </div>
        </main>
    </div>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/datatable.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('projects-table-container');
            const searchInput = document.querySelector('input[type="text"].form-control');
            const statusFilter = document.querySelector('select.form-control');
            
            try {
                const rawProjects = await window.api.projects.getAll();
                if (rawProjects.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:20px;">No projects found</div>';
                    return;
                }

                const processedData = rawProjects.map(proj => {
                    let color = 'gray';
                    const s = (proj.status || '').toUpperCase();
                    if (s === 'ACTIVE' || s === 'ONGOING') color = 'green';
                    else if (s === 'COMPLETED') color = 'blue';
                    else if (s === 'APPROVED') color = 'purple';
                    else if (s === 'PENDING' || s === 'PROPOSED') color = 'orange';

                    return {
                        ...proj,
                        displayStatus: proj.status || 'Pending',
                        color
                    };
                });

                const columns = [
                    { key: 'id', label: 'ID', render: (val) => val.substring(0, 8) + '...' },
                    { key: 'title', label: 'Title' },
                    { key: 'piName', label: 'Principal Investigator', render: (val) => val || 'Unknown' },
                    { 
                        key: 'displayStatus', 
                        label: 'Status',
                        render: (val, row) => `<span style="color:${row.color}; font-weight:bold;">${val}</span>`
                    }
                ];

                const filterData = () => {
                    const searchVal = searchInput.value.toLowerCase();
                    const statusVal = statusFilter.value.toLowerCase();
                    
                    return processedData.filter(proj => {
                        const matchesSearch = !searchVal || 
                            (proj.title || '').toLowerCase().includes(searchVal) ||
                            (proj.piName || '').toLowerCase().includes(searchVal);
                            
                        const matchesStatus = !statusVal || (proj.status || '').toLowerCase() === statusVal;
                        
                        return matchesSearch && matchesStatus;
                    });
                };

                const dataTable = new InteractiveTable('projects-table-container', {
                    columns,
                    data: filterData(),
                    pageSize: 25,
                    defaultSort: 'title',
                    defaultSortAsc: true
                });
                
                searchInput.addEventListener('input', () => dataTable.setData(filterData()));
                statusFilter.addEventListener('change', () => dataTable.setData(filterData()));

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="text-align:center; padding:20px; color:red;">Failed to load data. Ensure backend is running.</div>';
            }
        });
    </script>
</body>
</html>
