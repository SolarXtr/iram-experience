<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferences | RAM-U</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <div id="app">
        <!-- Layout Placeholders -->
        <div id="sidebar-placeholder"></div>
        <div id="navbar-placeholder"></div>

        <main class="main-content">
            <header style="margin-bottom: 24px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h1>Conferences & Presentations</h1>
                    <p class="text-muted">Track national and international academic presentations.</p>
                </div>
                <button class="btn btn-primary">+ Log Presentation</button>
            </header>

            <!-- Search & Filter Bar -->
            <div class="card" style="margin-bottom: 24px; padding: 16px;">
                <div style="display:flex; gap:16px; align-items:center;">
                    <input type="text" class="form-control" placeholder="Search conferences..." style="flex:1;">
                    <select class="form-control" style="width:200px;">
                        <option value="">All Types</option>
                        <option value="ORAL">Oral Presentation</option>
                        <option value="POSTER">Poster Presentation</option>
                    </select>
                    <button class="btn btn-outline">Filter</button>
                </div>
            </div>

            <!-- Data Table -->
            <div class="card" id="conferences-table-container">
                <div style="text-align:center; padding:20px;">Loading conferences...</div>
            </div>
        </main>
    </div>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/datatable.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('conferences-table-container');
            const searchInput = document.querySelector('input[type="text"].form-control');
            const typeFilter = document.querySelector('select.form-control');
            
            try {
                const rawConferences = await window.api.conferences.getAll();
                if (rawConferences.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:20px;">No presentations found</div>';
                    return;
                }

                const processedData = rawConferences.map(c => {
                    let badgeColor = '#6c757d';
                    if (c.type === 'ORAL') badgeColor = '#007bff';
                    else if (c.type === 'POSTER') badgeColor = '#17a2b8';

                    return {
                        ...c,
                        displayType: c.type || 'Unknown',
                        displayStatus: c.status || 'Pending',
                        badgeColor
                    };
                });

                const columns = [
                    { key: 'conference', label: 'Conference Name' },
                    { key: 'title', label: 'Presentation Title' },
                    { key: 'presenterName', label: 'Presenter', render: (val) => val || 'Unknown' },
                    { 
                        key: 'displayType', 
                        label: 'Type',
                        render: (val, row) => `<span class="badge" style="background:${row.badgeColor}; color:white; padding:4px 8px; border-radius:4px; font-size:0.85em;">${val}</span>`
                    },
                    { 
                        key: 'displayStatus', 
                        label: 'Status',
                        render: (val) => `<span style="font-weight:500;">${val}</span>`
                    }
                ];

                const filterData = () => {
                    const searchVal = searchInput.value.toLowerCase();
                    const typeVal = typeFilter.value.toUpperCase();
                    
                    return processedData.filter(c => {
                        const matchesSearch = !searchVal || 
                            (c.conference || '').toLowerCase().includes(searchVal) ||
                            (c.title || '').toLowerCase().includes(searchVal) ||
                            (c.presenterName || '').toLowerCase().includes(searchVal);
                            
                        const matchesType = !typeVal || (c.type || '').toUpperCase() === typeVal;
                        
                        return matchesSearch && matchesType;
                    });
                };

                const dataTable = new InteractiveTable('conferences-table-container', {
                    columns,
                    data: filterData(),
                    pageSize: 25,
                    defaultSort: 'conference',
                    defaultSortAsc: true
                });
                
                searchInput.addEventListener('input', () => dataTable.setData(filterData()));
                typeFilter.addEventListener('change', () => dataTable.setData(filterData()));

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="text-align:center; padding:20px; color:red;">Failed to load data. Ensure backend is running.</div>';
            }
        });
    </script>
</body>
</html>
