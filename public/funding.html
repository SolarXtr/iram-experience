<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funding & Grants | RAM-U</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <div id="app">
        <!-- Layout Placeholders -->
        <div id="sidebar-placeholder"></div>
        <div id="navbar-placeholder"></div>

        <main class="main-content">
            <header style="margin-bottom: 24px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h1>Funding & Grants</h1>
                    <p class="text-muted">Manage external and internal research funding.</p>
                </div>
                <button class="btn btn-primary">+ Add Grant</button>
            </header>

            <div class="card" style="margin-bottom: 24px; padding: 16px;">
                <div style="display:flex; gap:16px; align-items:center;">
                    <input type="text" class="form-control" placeholder="Search funding sources..." style="flex:1;">
                    <select class="form-control" style="width:200px;">
                        <option value="">All Types</option>
                        <option value="internal">Internal Funding</option>
                        <option value="external">External Funding</option>
                    </select>
                    <button class="btn btn-outline">Filter</button>
                </div>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Source</th>
                                <th>Type</th>
                                <th>Allocated To</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>National Research Council</td>
                                <td>External</td>
                                <td>Advanced Nanomaterials</td>
                                <td>$150,000</td>
                                <td><span style="color:green; font-weight:bold;">Awarded</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/components.js"></script>
</body>
</html>
